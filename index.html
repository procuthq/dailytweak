<!DOCTYPE html>
<!-- © 2026 Darkhan Shalgynbayev / DailyTweak. All rights reserved. -->
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DailyTweak</title>
<meta property="og:title" content="DailyTweak">
<meta property="og:description" content="App, software & electronics reviews — tested like an engineer.">
<meta property="og:url" content="https://dailytweak.com">
<meta property="og:type" content="website">
<script data-goatcounter="https://dailytweak.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
  :root{
    --bg:#F2F4F7; --grid:#E0E4EB; --ink:#161A23;
    --accent:#234EDE; --muted:#687082; --card:#FAFAFC; --border:#D2D7E0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:48px 48px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  .card{
    max-width:480px; width:90%;
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:40px 36px; text-align:center;
    box-shadow:0 1px 3px rgba(20,24,32,.06);
  }
  .wordmark{font-size:34px; font-weight:800; letter-spacing:-.5px; margin:0 0 6px;}
  .wordmark span{color:var(--accent);}
  .sub{color:var(--muted); font-size:14px; margin:0 0 28px;}
  .choices{display:flex; flex-direction:column; gap:12px; margin-bottom:18px;}
  .choice{
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:14px 18px; border-radius:12px; border:1.5px solid var(--border);
    background:#fff; color:var(--ink); text-decoration:none;
    font-size:16px; font-weight:600; transition:border-color .15s, transform .1s;
  }
  .choice:hover{border-color:var(--accent); transform:translateY(-1px);}
  .status{
    font-size:13px; color:var(--muted); min-height:18px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  .status a{color:var(--accent); text-decoration:underline; cursor:pointer;}
  .status .count{color:var(--accent); font-weight:700; font-size:15px;}
  .progress-track{height:4px; background:var(--border); border-radius:2px; margin-top:10px; overflow:hidden;}
  .progress-fill{height:100%; width:100%; background:var(--accent); border-radius:2px; transition:width 1s linear;}
  .region-note{font-size:12px; color:var(--muted); margin:-6px 0 18px; opacity:.85;}
</style>
</head>
<body>

<div class="card">
  <p class="wordmark">Daily<span>Tweak</span></p>
  <p class="sub">App, software &amp; electronics reviews — tested like an engineer.</p>

  <div class="choices">
    <a class="choice" href="https://www.youtube.com/@dailytweak" id="enLink" data-goatcounter-click="watch-english">
      🇺🇸 Watch in English
    </a>
    <a class="choice" href="https://www.youtube.com/@дейлитвик" id="ruLink" data-goatcounter-click="watch-russian">
      🇰🇿 Смотреть на русском
    </a>
  </div>
  <p class="region-note">Also reaching a Russian-speaking audience across Central Asia</p>

  <p class="status" id="status" aria-live="polite" aria-atomic="true"></p>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
(function () {
  // TODO: once the Russian channel handle finishes its 14-day rename
  // lock and becomes @dailytweakrus, update ruLink's href above
  // (currently pointing at the percent-encoded Cyrillic handle @ДейлиТвик).

  var userLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
  var cisLanguages = ["ru", "kk", "be", "uz", "ky", "tg", "am", "az", "tk"];
  var isCIS = cisLanguages.some(function (lang) { return userLang.startsWith(lang); });

  var target = isCIS ? document.getElementById("ruLink").href : document.getElementById("enLink").href;

  function numSpan(s) { return "<span class='count'>" + s + "</span>"; }

  var countdownText = isCIS
    ? function (s) { return "Переходим на русскоязычный канал через " + numSpan(s) + " сек… <a id='toggleLink'>Пауза</a>"; }
    : function (s) { return "Taking you to the English channel in " + numSpan(s) + "s… <a id='toggleLink'>Pause</a>"; };

  var pausedText = isCIS
    ? function (s) { return "Пауза на " + numSpan(s) + " сек — <a id='toggleLink'>Продолжить</a>"; }
    : function (s) { return "Paused at " + numSpan(s) + "s — <a id='toggleLink'>Resume</a>"; };

  var TOTAL = 5;
  var remaining = TOTAL;
  var timer = null;
  var paused = false;
  var statusEl = document.getElementById("status");
  var fillEl = document.getElementById("progressFill");

  function updateFill() {
    fillEl.style.width = Math.max(0, (remaining / TOTAL) * 100) + "%";
  }

  function attachToggle() {
    var t = document.getElementById("toggleLink");
    if (!t) return;
    t.onclick = function () {
      if (paused) {
        paused = false;
        showRunning();
        timer = setInterval(tick, 1000);
      } else {
        paused = true;
        clearInterval(timer);
        showPaused();
      }
    };
  }

  function showRunning() {
    statusEl.innerHTML = countdownText(remaining);
    updateFill();
    attachToggle();
  }

  function showPaused() {
    statusEl.innerHTML = pausedText(remaining);
    attachToggle();
  }

  function fireAutoRedirectEvent() {
    if (window.goatcounter && window.goatcounter.count) {
      window.goatcounter.count({
        path: isCIS ? "auto-redirect-russian" : "auto-redirect-english",
        event: true
      });
    }
  }

  function tick() {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      fillEl.style.width = "0%";
      statusEl.innerHTML = isCIS ? "Переходим…" : "Redirecting…";
      fireAutoRedirectEvent();
      setTimeout(function () { window.location.href = target; }, 1000);
      return;
    }
    showRunning();
  }

  showRunning();
  timer = setInterval(tick, 1000);
})();
</script>

</body>
</html>
