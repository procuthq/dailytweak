<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Daily Tweak Hub</title>
    <script>
        (function() {
            // Reads the visitor's web browser language setting array and converts to lowercase
            var userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase(); 
            
            // Comprehensive CIS Language Registry Array
            var cisLanguages = ['ru', 'kk', 'be', 'uz', 'ky', 'tg', 'am', 'az'];
            
            // Checks if the user's primary browser language matches any in our CIS array
            var isCIS = cisLanguages.some(function(lang) {
                return userLang.startsWith(lang);
            });
            
            if (isCIS) {
                // 🇷🇺 Forwards safely using clean Percent-Encoding for @ДейлиТвик
                window.location.replace("https://www.youtube.com/@ДейлиТвик");
            } else {
                // 🇺🇸 Forwards directly to your specific English Channel handle @DailyTweak
                window.location.replace("https://www.youtube.com/@DailyTweak");
            }
        })();
    </script>
</head>
<body style="background-color: #000;">
</body>
</html>
